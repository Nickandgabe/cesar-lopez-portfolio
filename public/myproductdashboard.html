<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products Hub</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f7f7f8;
    --card: #ffffff;
    --border: #e4e4e7;
    --text: #18181b;
    --muted: #71717a;
    --accent: #4f46e5;
    --accent-light: #eef2ff;
    --live: #16a34a;
    --dev: #d97706;
    --planning: #64748b;
    --paused: #dc2626;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 8px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 28px 32px 60px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
    font-weight: 700;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13.5px;
    margin: 0 0 22px;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stats {
    display: flex;
    gap: 10px;
    margin-right: auto;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 12.5px;
    color: var(--muted);
    box-shadow: var(--shadow);
  }
  .stat b { color: var(--text); font-size: 14px; }
  select, input[type=text] {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 13px;
    background: var(--card);
    color: var(--text);
  }
  button {
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: #f4f4f5; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform .08s ease, box-shadow .08s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-name { font-size: 16px; font-weight: 700; }
  .card-type { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .02em; }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-live { background: #dcfce7; color: var(--live); }
  .badge-dev { background: #fef3c7; color: var(--dev); }
  .badge-planning { background: #e2e8f0; color: var(--planning); }
  .badge-paused { background: #fee2e2; color: var(--paused); }
  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
    min-height: 18px;
  }
  .card-desc.empty { font-style: italic; color: #b0b0b6; }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
    font-size: 11.5px;
    color: var(--muted);
  }
  .card-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    font-size: 12px;
  }
  .card-link:hover { text-decoration: underline; }
  .footer-note {
    margin-top: 28px;
    font-size: 12px;
    color: var(--muted);
    max-width: 700px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<h1>Products Hub</h1>
<p class="subtitle">Central view of everything you're running — click a card to open its live report.</p>

<div class="toolbar">
  <div class="stats" id="stats"></div>
  <select id="filterType">
    <option value="">All types</option>
    <option value="Own product">Own product</option>
    <option value="Tool I use">Tool I use</option>
  </select>
  <select id="filterStatus">
    <option value="">All statuses</option>
    <option value="Live">Live</option>
    <option value="In development">In development</option>
    <option value="Planning">Planning</option>
    <option value="Paused">Paused</option>
  </select>
  <button class="btn-ghost" id="exportBtn">Export JSON</button>
  <button class="btn-ghost" id="importBtn">Import JSON</button>
  <input type="file" id="importFile" accept="application/json" style="display:none">
</div>

<div class="grid" id="grid"></div>

<p class="footer-note">
  Click a card to open its live report, synced straight from that project's GitHub repo.
  Status, description, links, and notes for each project are now managed from the menu on its report page.
</p>

<script>
const STORAGE_KEY = 'products_hub_data_v1';

const defaults = [
  { id: cryptoId(), name: 'Nexus', type: 'Own product', status: 'In development', desc: '', url: '', specs: '', updated: null, slug: 'nexus' },
  { id: cryptoId(), name: 'Nerve', type: 'Own product', status: 'In development', desc: '', url: '', specs: '', updated: null, slug: 'nerve' },
  { id: cryptoId(), name: 'Swap Zone', type: 'Own product', status: 'In development', desc: '', url: '', specs: '', updated: null, slug: 'swapzone' },
  { id: cryptoId(), name: 'Together', type: 'Own product', status: 'In development', desc: '', url: '', specs: '', updated: null, slug: 'together' },
  { id: cryptoId(), name: 'My Portfolio', type: 'Own product', status: 'Live', desc: '', url: '', specs: '', updated: null, slug: 'portfolio' },
];

function cryptoId() {
  return 'p_' + Math.random().toString(36).slice(2, 10);
}

const KNOWN_SLUGS = {
  'Nexus': 'nexus',
  'Nerve': 'nerve',
  'Swap Zone': 'swapzone',
  'Together': 'together',
  'My Portfolio': 'portfolio',
};

function load() {
  let existing = [];
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Backfill slugs for anyone who saved data before report links existed.
      existing = parsed.map(p => (p.slug || !KNOWN_SLUGS[p.name]) ? p : { ...p, slug: KNOWN_SLUGS[p.name] });
    }
  } catch (e) {}

  // Union-merge with defaults: a report page's menu only ever knows about
  // the single project it's managing, so if it saves before this dashboard
  // has ever seeded localStorage, `existing` can be missing projects. Add
  // back any known default whose slug isn't already present, instead of
  // trusting `existing` as if it were guaranteed complete.
  const existingSlugs = new Set(existing.map(p => p.slug).filter(Boolean));
  const missing = defaults.filter(d => !existingSlugs.has(d.slug));
  const merged = existing.concat(missing);

  if (missing.length) save(merged);
  return merged;
}

function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let data = load();

const grid = document.getElementById('grid');
const statsEl = document.getElementById('stats');
const filterType = document.getElementById('filterType');
const filterStatus = document.getElementById('filterStatus');

function statusBadgeClass(status) {
  return {
    'Live': 'badge-live',
    'In development': 'badge-dev',
    'Planning': 'badge-planning',
    'Paused': 'badge-paused'
  }[status] || 'badge-planning';
}

function fmtDate(iso) {
  if (!iso) return 'never updated';
  const d = new Date(iso);
  return 'updated ' + d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function render() {
  const t = filterType.value;
  const s = filterStatus.value;
  const filtered = data.filter(p => (!t || p.type === t) && (!s || p.status === s));

  grid.innerHTML = '';
  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    if (p.slug) {
      card.onclick = () => { window.top.location.href = '/myproductdashboard/' + p.slug; };
    }
    card.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-name">${escapeHtml(p.name)}</div>
          <div class="card-type">${escapeHtml(p.type)}</div>
        </div>
        <span class="badge ${statusBadgeClass(p.status)}">${escapeHtml(p.status)}</span>
      </div>
      <div class="card-desc ${p.desc ? '' : 'empty'}">${p.desc ? escapeHtml(p.desc) : 'No description yet'}</div>
      <div class="card-footer">
        <span>${fmtDate(p.updated)}</span>
        <span style="display:flex;gap:10px;align-items:center;">
          ${p.slug ? `<a class="card-link" href="/myproductdashboard/${escapeHtml(p.slug)}" target="_top" onclick="event.stopPropagation()">Report →</a>` : ''}
          ${p.url ? `<a class="card-link" href="${escapeHtml(p.url)}" target="_blank" onclick="event.stopPropagation()">Open →</a>` : ''}
        </span>
      </div>
    `;
    grid.appendChild(card);
  });

  renderStats();
}

function renderStats() {
  const total = data.length;
  const live = data.filter(p => p.status === 'Live').length;
  const dev = data.filter(p => p.status === 'In development').length;
  const own = data.filter(p => p.type === 'Own product').length;
  statsEl.innerHTML = `
    <div class="stat"><b>${total}</b> total</div>
    <div class="stat"><b>${live}</b> live</div>
    <div class="stat"><b>${dev}</b> in dev</div>
    <div class="stat"><b>${own}</b> own products</div>
  `;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.innerText = str || '';
  return d.innerHTML;
}

filterType.onchange = render;
filterStatus.onchange = render;

document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'products-hub-backup.json';
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (Array.isArray(parsed)) {
        data = parsed;
        save(data);
        render();
      }
    } catch (err) {
      alert('Could not read that file as valid JSON.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

render();
</script>
</body>
</html>
